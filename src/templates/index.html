<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        
        <link
            rel="stylesheet"
            href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css"
            crossorigin="anonymous"
        />
        <title>{% block title %}Silksong Completion Analyzer{% endblock %}</title>
    </head>
    <style>

        body {
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
            text-align: center;
        }

        .box  {
            margin: 0px auto;
            height: 21px;
            width: 550px;
            background-color: grey;
            overflow-wrap: break-word;
            text-align: center;
            border-radius: 10px;
            outline: 5px solid whitesmoke 
        }
        button {
            margin: 15px auto;
            text-align: center;
            border-radius: 10px;
        }

    </style>
    <body style="text-align:center;">
        <h1>Save File Completion Analyzer</h1>

        <h2>For Hollow Knight: Silksong</h2>

        <p>Your save file can be found at:</p>

        <div class="box">
            <p style="color: white; font-size: 15px;">
                %USERPROFILE%\AppData\LocalLow\Team Cherry\Hollow Knight Silksong\
            </p>
        </div>

        <form method="POST" enctype="multipart/form-data" id="uploadForm">

            {{ form.hidden_tag() }}
            
            {{ form.file(id="fileInput", style="display:none;", onchange="document.getElementById('uploadForm').submit();") }}

            <button type="button" class="my_button" onclick="document.getElementById('fileInput').click()">
            Select Save File...
            </button>
        </form>

    

        
        






        
 
        <script
            src="https://code.jquery.com/jquery-3.2.1.slim.min.js"
            integrity="sha384-KJ3o2DKtIkvYIK3UENzmM7KCkRr/rE9/Qpg6aAZGJwFDMVNA/GpGFF93hXpG5KkN"
            crossorigin="anonymous"
        ></script>
        <script
            src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.12.9/umd/popper.min.js"
            integrity="sha384-ApNbgh9B+Y1QKtv3Rn7W3mgPxhU9K/ScQsAP7hUibX39j7fakFPskvXusvfa0b4Q"
            crossorigin="anonymous"
        ></script>
        <script
            src="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/js/bootstrap.min.js"
            integrity="sha384-JZR6Spejh4U02d8jOt6vLEHfe/JQGiRRSQQxSfFWpi1MquVdAyjUar5+76PVCmYl"
            crossorigin="anonymous"
        ></script>

    </body>
</html>
